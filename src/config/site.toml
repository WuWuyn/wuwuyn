[config.site]
title = "wuwuyn"
description = "Data Science, data analysis, and personal notes from wuwuyn."
pageTitle = "wuwuyn | Personal Notebook"
pageDescription = "A calm personal space for data notes, machine learning practice, and learning logs from wuwuyn."
repository = "https://github.com/WuWuyn"
footerNote = "A quiet personal notebook."
templateCredit = "Template inspired by Astro Navfolio."
templateCreditHref = "https://github.com/astro-navfolio/astro-navfolio"

[config.theme]
# Available palettes:
# green-soft, green-vivid, rose-soft, pink-soft, purple-soft, blue-soft, orange-soft, brown-soft
palette = "blue-soft"

[config.comments]
enabled = false
provider = "none"
show_on_posts = false

[config.search]
enabled = true
shortcut = "mod+k"
placeholder = "Search wuwuyn..."
maxResults = 6

[config.blog]
postsPerPage = 6

[config.comments.giscus]
repo = ""
repo_id = ""
category = ""
category_id = ""
mapping = "pathname"
strict = "0"
reactions_enabled = "1"
emit_metadata = "0"
input_position = "top"
theme = "preferred_color_scheme"
lang = "en"
loading = "lazy"

[config.comments.utterances]
repo = ""
issue_term = "pathname"
label = "comment"
theme = "github-light"

[config.comments.waline]
server_url = ""
lang = "en"
dark = "html.dark"
pageview = true
comment = true

[config.profile]
name = "wuwuyn"
handle = "@wuwuyn"
role = "Data Science & Machine Learning"
company = ""
location = ""
email = ""
website = ""
github = "https://github.com/WuWuyn"
meta = "Data analysis, machine learning, personal projects"
avatar = "images/avatar-cat.png"

[[config.topNav.links]]
label = "Home"
href = "/"

[[config.topNav.links]]
label = "Blog"
href = "/blog"

[[config.topNav.links]]
label = "Projects"
href = "/projects"

[[config.topNav.links]]
label = "About"
href = "/about"

[config.home]
layout = "grid"

[config.home.quote]
text = ["keep it quiet,", "write it down,", "let the small things stay."]
image = "images/avatar-cat.png"

[config.home.intro]
title = "here is wuwuyn"
name = "wuwuyn"
body = [
  "I am interested in Data Science, data analysis, machine learning, and turning ideas into useful personal projects.",
  "This space keeps learning notes, project traces, data analysis ideas, and small discoveries in one readable place.",
  "I like exploring new technologies and documenting what I learn along the way."
]
image = "images/avatar-cat.png"

[config.home.latest]
count = 1
heatmapWeeks = 24
showHeatmapLatest = true
excludeDraft = true
startDate = ""
dateArchiveBaseHref = ""

[[config.home.navigation]]
icon = "pen"
title = "Blog"
subtitle = "Learning notes and longer thoughts"
href = "/blog"

[[config.home.navigation]]
icon = "repo"
title = "Projects"
subtitle = "Data, learning, and personal projects"
href = "/projects"

[[config.home.navigation]]
icon = "compass"
title = "About"
subtitle = "A short note about this space"
href = "/about"

[[config.home.connect]]
label = "GitHub"
href = "https://github.com/WuWuyn/wuwuyn"
icon = "github"

